# Local development only — uses pgvector image so the extension is preinstalled.
# Production uses Neon, Upstash Redis, and a managed Docker host (Render / Fly).
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: dailypages
      POSTGRES_PASSWORD: dailypages
      POSTGRES_DB: dailypages
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dailypages -d dailypages"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://dailypages:dailypages@db:5432/dailypages
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://dailypages:dailypages@db:5432/dailypages
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.worker worker --loglevel=INFO --concurrency=2

volumes:
  pgdata:
