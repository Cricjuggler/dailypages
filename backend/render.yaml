# Render Blueprint — single-container deploy (API + Celery worker via start.sh).
# Connect this repo to Render and pick "Blueprint" to apply, or set up manually
# via "New → Web Service".
services:
  - type: web
    name: dailypages-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: R2_BUCKET
        value: dailypages-uploads
      # Secrets — paste these in the Render dashboard after creation.
      - key: DATABASE_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: CLERK_ISSUER
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_AUDIENCE
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: VOYAGE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
