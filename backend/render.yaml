# Render Blueprint — deploy a Dockerized FastAPI service.
# Connect this repo to Render and pick "Blueprint" to apply.
services:
  - type: web
    name: dailypages-api
    runtime: docker
    plan: starter
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        sync: false        # paste your Neon URL in the Render dashboard
      - key: CLERK_ISSUER
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_AUDIENCE
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        value: dailypages-uploads
      - key: CORS_ORIGINS
        sync: false
